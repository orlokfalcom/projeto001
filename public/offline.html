<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Você está offline | Silêncios da Saúde</title>
  <style>
    :root {
      --rosa-claro: #FADADD;
      --lilas: #CDB4DB;
      --cinza-fundo: #F9F7F8;
      --texto-escuro: #2D2327;
      --font-display: 'Inter', system-ui, -apple-system, sans-serif;
    }

    body {
      background-color: var(--cinza-fundo);
      color: var(--texto-escuro);
      font-family: var(--font-display);
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      box-sizing: border-box;
      text-align: center;
    }

    .container {
      max-width: 500px;
      padding: 40px 20px;
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 32px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
      margin: 20px;
    }

    .icon {
      font-size: 64px;
      margin-bottom: 24px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    h1 {
      font-size: 24px;
      font-weight: 800;
      margin: 0 0 12px 0;
      letter-spacing: -0.5px;
    }

    p {
      font-size: 15px;
      line-height: 1.6;
      color: rgba(45, 35, 39, 0.8);
      margin: 0 0 24px 0;
      font-weight: 500;
    }

    .btn {
      display: inline-block;
      background-color: var(--lilas);
      color: var(--texto-escuro);
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
      padding: 12px 32px;
      border-radius: 9999px;
      transition: all 0.2s ease;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(205, 180, 219, 0.3);
    }

    .btn:hover {
      background-color: #be9ecf;
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(205, 180, 219, 0.4);
    }

    .btn:active {
      transform: translateY(0);
    }

    .footer-text {
      font-size: 11px;
      color: rgba(45, 35, 39, 0.4);
      margin-top: 32px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🌸</div>
    <h1>Você está offline</h1>
    <p>
      O portal <strong>Silêncios da Saúde</strong> funciona offline, mas parece que esta página específica ainda não foi carregada no seu dispositivo. Conecte-se à internet para acessá-la.
    </p>
    <button onclick="window.location.reload()" class="btn">Tentar Novamente</button>
    <div class="footer-text">Silêncios da Saúde</div>
  </div>
</body>
</html>
